name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint pytest pytest-cov
          # Runtime deps without QGIS (shapely is a standalone stand-in for GEOS calls)
          pip install shapely numpy
          pip install numba || echo "numba optional – skipping"

      - name: Flake8 (style + syntax)
        run: |
          flake8 LIRiAP_pack LiRiAP_provider \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --count --statistics

      - name: Pylint (logic + type hints)
        run: |
          pylint LIRiAP_pack LiRiAP_provider \
            --max-line-length=120 \
            --disable=C0114,C0115,C0116,R0903,R0913,R0914,W0611 \
            --fail-under=7.0 || true

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=LIRiAP_pack --cov-report=xml \
            || echo "No tests collected – continuing"

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        continue-on-error: true
